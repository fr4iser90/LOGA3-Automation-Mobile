version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Group noisy Expo patch bumps when possible
    groups:
      expo-related:
        patterns:
          - 'expo*'
          - '@expo/*'
          - 'jest-expo'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
