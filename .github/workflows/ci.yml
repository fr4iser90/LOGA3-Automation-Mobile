name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · test · audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (lockfile only)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci --watchAll=false

      - name: npm audit (high+)
        # Moderate transitive noise (e.g. uuid via Expo xcode) is tracked in
        # .scanning/finding-policy.json — do not lower this to "moderate" without review.
        run: npm audit --audit-level=high
